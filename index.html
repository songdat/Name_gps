<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student GPS Sender</title>

<style>

body {

  font-family: Arial;
  text-align: center;
  background: #f2f2f2;
  padding: 30px;

}

h2 {

  color: #333;

}

input {

  width: 90%;
  max-width: 400px;

  padding: 12px;

  font-size: 18px;

}

button {

  margin-top: 15px;

  padding: 12px 25px;

  font-size: 18px;

  cursor: pointer;

}

#status {

  margin-top: 20px;

  font-size: 18px;

  color: green;

}

</style>

</head>

<body>

<h2>

กรอกชื่อ-สกุล ชื่อเล่น ระดับชั้น

</h2>

<input
type="text"
id="studentName"
placeholder="เช่น นายสุขใจ ใจบุญ บิ๊ก 1/2">

<br>

<button onclick="sendLocation()">

ส่งตำแหน่ง GPS

</button>

<p id="status"></p>

<script>

async function sendLocation() {

  const name =
    document.getElementById("studentName").value;

  if(name === "") {

    alert("กรุณากรอกชื่อ");

    return;
  }

  if(!navigator.geolocation) {

    alert("อุปกรณ์ไม่รองรับ GPS");

    return;
  }

  document.getElementById("status")
    .innerText =
    "กำลังรับตำแหน่ง...";

  navigator.geolocation.getCurrentPosition(

    async function(position) {

      const data = {

        name: name,

        latitude:
          position.coords.latitude,

        longitude:
          position.coords.longitude

      };

      try {

        await fetch(

          "https://script.google.com/macros/s/AKfycbwjitAwMKXfKbsGslgnCLnfT7IeiIkTPrlhAf-IuRvzvducvSlghH5KZw0besr3CUIc/exec",

          {

            method: "POST",

            headers: {
              "Content-Type":
              "application/json"
            },

            body:
              JSON.stringify(data)

          }

        );

        document.getElementById("status")
          .innerText =
          "ส่งข้อมูลเรียบร้อย";

      }

      catch(error) {

        document.getElementById("status")
          .innerText =
          "เกิดข้อผิดพลาด";

      }

    },

    function(error) {

      document.getElementById("status")
        .innerText =
        "ไม่สามารถรับ GPS";

    }

  );

}

</script>

</body>

</html>
