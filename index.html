<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Realtime Student Map</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html, body {

  height: 100%;
  margin: 0;

}

#map {

  width: 100%;
  height: 100%;

}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView(
  [17.4138, 102.7870],
  13
);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution: 'OpenStreetMap'
  }
).addTo(map);

let markers = [];

async function loadLocations() {

  try {

    // ===== GET DATA =====
    const response =
      await fetch(
        'https://script.google.com/macros/s/AKfycbxXMC38u94CEhXTG5rzKYcxK4YSKIK0HstQyV6d_bZ8opdALostMR1YrNh7O01wiCdP/exec'
      );

    const data =
      await response.json();

    // ===== REMOVE OLD MARKERS =====
    markers.forEach(marker => {

      map.removeLayer(marker);

    });

    markers = [];

    // ===== ADD NEW MARKERS =====
    data.forEach(item => {

      const marker = L.marker([
        item.latitude,
        item.longitude
      ])

      .addTo(map)

      .bindPopup(
        "<b>" + item.name + "</b><br>" +
        item.latitude + ", " +
        item.longitude
      );

      markers.push(marker);

    });

  }

  catch(error) {

    console.log(error);

  }

}

// ===== FIRST LOAD =====
loadLocations();

// ===== AUTO REFRESH EVERY 5 SEC =====
setInterval(loadLocations, 5000);

</script>

</body>

</html>
