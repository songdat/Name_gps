<script>

async function sendLocation() {

  const name =
    document.getElementById("studentName").value;

  if(name === "") {

    alert("กรุณากรอกชื่อ");

    return;
  }

  if(!navigator.geolocation) {

    alert("อุปกรณ์ไม่รองรับ GPS");

    return;
  }

  document.getElementById("status")
    .innerText =
    "กำลังรับตำแหน่ง GPS...";

  navigator.geolocation.getCurrentPosition(

    async function(position) {

      const data = {

        name: name,

        latitude:
          position.coords.latitude,

        longitude:
          position.coords.longitude

      };

      try {

        await fetch(

          "https://script.google.com/macros/s/AKfycbyYdG6IHOoqxygbTBdnFUEnK0wFKa8Uv9ZCo2wHze6z3-AWQVacwPT07jSpNyITCkNF/exec",

          {

            method: "POST",

            mode: "no-cors",

            headers: {
              "Content-Type":
              "application/json"
            },

            body:
              JSON.stringify(data)

          }

        );

        document.getElementById("status")
          .innerText =
          "ส่งข้อมูลเรียบร้อย";

      }

      catch(error) {

        document.getElementById("status")
          .innerText =
          "เกิดข้อผิดพลาด";

        console.log(error);

      }

    },

    function(error) {

      document.getElementById("status")
        .innerText =
        "GPS Error : " + error.message;

    },

    {

      enableHighAccuracy: true,

      timeout: 10000,

      maximumAge: 0

    }

  );

}

</script>
